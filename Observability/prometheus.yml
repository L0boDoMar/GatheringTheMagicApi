global:
  scrape_interval: 10s #atualização da base do prometeus
scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
  - job_name: 'gathering-the-magic-api'
    scheme: https 
    tls_config:
      insecure_skip_verify: true 
    static_configs:
      - targets: ['host.docker.internal:7153']